<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 220">
  <defs>
    <linearGradient id="leaf" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6FAF45"></stop>
      <stop offset="100%" stop-color="#3F6F2B"></stop>
    </linearGradient>
    <linearGradient id="core" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF9A3D"></stop>
      <stop offset="100%" stop-color="#E66A00"></stop>
    </linearGradient>
  </defs>

  <!-- Apple -->
  <circle cx="110" cy="115" r="72" fill="url(#core)"></circle>

  <!-- Bite -->
  <circle cx="165" cy="98" r="18" fill="white"></circle>

  <!-- Leaf -->
  <ellipse cx="135" cy="40" rx="16" ry="28" transform="rotate(35 135 40)" fill="url(#leaf)"></ellipse>

  <!-- Circuit lines -->
  <g stroke="white" stroke-width="6" stroke-linecap="round">
    <line x1="110" y1="70" x2="110" y2="150"></line>
    <line x1="80" y1="95" x2="140" y2="95"></line>
    <line x1="80" y1="130" x2="140" y2="130"></line>
  </g>

  <!-- Circuit nodes -->
  <g fill="white">
    <circle cx="110" cy="70" r="5"></circle>
    <circle cx="110" cy="150" r="5"></circle>
    <circle cx="80" cy="95" r="5"></circle>
    <circle cx="140" cy="95" r="5"></circle>
    <circle cx="80" cy="130" r="5"></circle>
    <circle cx="140" cy="130" r="5"></circle>
  </g>
</svg>